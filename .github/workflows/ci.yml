name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/packages.lock.json

      - name: Restore solution
        run: dotnet restore WorkSafeBC.ClaimsIngestion.slnx

      - name: Build solution
        run: dotnet build WorkSafeBC.ClaimsIngestion.slnx --configuration $CONFIGURATION --no-restore

      - name: Run unit tests
        run: dotnet test tests/WorkSafeBC.Claims.Tests.Unit/WorkSafeBC.Claims.Tests.Unit.csproj --configuration $CONFIGURATION --no-build --logger "trx;LogFileName=unit-tests.trx" --results-directory artifacts/test-results

      - name: Run architecture tests
        run: dotnet test tests/WorkSafeBC.Claims.Tests.Architecture/WorkSafeBC.Claims.Tests.Architecture.csproj --configuration $CONFIGURATION --no-build --logger "trx;LogFileName=architecture-tests.trx" --results-directory artifacts/test-results

      - name: Run contract tests
        run: dotnet test tests/WorkSafeBC.Claims.Tests.Contract/WorkSafeBC.Claims.Tests.Contract.csproj --configuration $CONFIGURATION --no-build --logger "trx;LogFileName=contract-tests.trx" --results-directory artifacts/test-results

      - name: Run integration tests
        run: dotnet test tests/WorkSafeBC.Claims.Tests.Integration/WorkSafeBC.Claims.Tests.Integration.csproj --configuration $CONFIGURATION --no-build --logger "trx;LogFileName=integration-tests.trx" --results-directory artifacts/test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: artifacts/test-results
          if-no-files-found: warn
