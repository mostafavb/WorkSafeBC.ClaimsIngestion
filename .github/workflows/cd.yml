name: cd

on:
  workflow_dispatch:
    inputs:
      resourceGroupName:
        description: Azure resource group for the dev deployment
        required: false
        default: rg-wsbcclaims-dev
      location:
        description: Azure region for the dev deployment
        required: false
        default: canadacentral
      deploymentStrategy:
        description: Worker rollout strategy
        required: false
        default: rolling
        type: choice
        options:
          - rolling
          - blueGreen
          - canary
      activeSlot:
        description: Active slot when using blue/green deployment
        required: false
        default: blue
        type: choice
        options:
          - blue
          - green
      stableMaxReplicas:
        description: Maximum replicas for the stable worker deployment
        required: false
        default: '2'
      canaryMaxReplicas:
        description: Maximum replicas for the canary worker deployment
        required: false
        default: '1'
  push:
    branches:
      - main

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  DOTNET_NOLOGO: true
  RESOURCE_GROUP_NAME: ${{ inputs.resourceGroupName || 'rg-wsbcclaims-dev' }}
  LOCATION: ${{ inputs.location || 'canadacentral' }}
  DEPLOYMENT_STRATEGY: ${{ inputs.deploymentStrategy || 'rolling' }}
  ACTIVE_SLOT: ${{ inputs.activeSlot || 'blue' }}
  STABLE_MAX_REPLICAS: ${{ inputs.stableMaxReplicas || '2' }}
  CANARY_MAX_REPLICAS: ${{ inputs.canaryMaxReplicas || '1' }}
  SQL_ADMIN_LOGIN: sqladminuser

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        uses: azure/cli@v2
        with:
          inlineScript: |
            az group create \
              --name "$RESOURCE_GROUP_NAME" \
              --location "$LOCATION" \
              --tags environment=dev application=WorkSafeBC.ClaimsIngestion managedBy=github-actions

      - name: Deploy Bicep infrastructure
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.RESOURCE_GROUP_NAME }}
          template: deploy/bicep/main.bicep
          parameters: >
            @deploy/bicep/main.dev.parameters.json
            location=${{ env.LOCATION }}
            deploymentStrategy=${{ env.DEPLOYMENT_STRATEGY }}
            activeSlot=${{ env.ACTIVE_SLOT }}
            stableMaxReplicas=${{ env.STABLE_MAX_REPLICAS }}
            canaryMaxReplicas=${{ env.CANARY_MAX_REPLICAS }}
            sqlAdministratorLogin=${{ env.SQL_ADMIN_LOGIN }}
            sqlAdministratorPassword=${{ secrets.SQL_ADMIN_PASSWORD }}

      - name: Show deployment summary
        uses: azure/cli@v2
        with:
          inlineScript: |
            echo "Deployment strategy: $DEPLOYMENT_STRATEGY"
            echo "Active slot: $ACTIVE_SLOT"
            az deployment group list \
              --resource-group "$RESOURCE_GROUP_NAME" \
              --query "[0].{name:name, timestamp:properties.timestamp, state:properties.provisioningState}" \
              --output table
